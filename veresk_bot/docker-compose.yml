services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_PATH: /app/data/veresk.db
    expose:
      - "3005"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "3005:3005"
      # 80/443 — только если нет другого веб-сервера (см. nginx.ssl.conf.example)
      # - "80:80"
      # - "443:443"
    volumes:
      - ./miniapp:/usr/share/nginx/html/miniapp:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - bot

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  redis_data:
