# Замените YOUR_DOMAIN на ваш домен и положите сертификаты в ./ssl/
# Основной вход: порт 3005 (HTTP). Для продакшена можно добавить SSL на 3005 или оставить блок 443 ниже.

server {
    listen 3005;
    server_name YOUR_DOMAIN;

    location /miniapp/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /miniapp/index.html;
        add_header Cache-Control "no-cache";
    }

    location /api/ {
        proxy_pass http://bot:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    location /miniapp/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /miniapp/index.html;
        add_header Cache-Control "no-cache";
    }

    location /api/ {
        proxy_pass http://bot:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
