# Основной конфиг: только порт 3005 (без 80/443 — не конфликтует с другими сервисами).
# Замените YOUR_DOMAIN на домен или _ .
# HTTPS: см. nginx.ssl.conf.example и docker-compose.ports в README.

server {
    listen 3005;
    server_name _;

    location /miniapp/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /miniapp/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ~* /miniapp/.*\.(css|js)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /admin/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /admin/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ~* /admin/.*\.(css|js)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /api/ {
        proxy_pass http://bot:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Telegram-Init-Data $http_x_telegram_init_data;
        proxy_set_header Authorization $http_authorization;
    }
}
